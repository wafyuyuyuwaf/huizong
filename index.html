<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工具箱</title>

    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            min-height: 100vh;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            padding: 2rem 1.5rem 3rem;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid #e9edf4;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            cursor: pointer;
            user-select: none;
        }

        .header-left h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.3px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .badge {
            background: #eef2f7;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #475569;
            font-weight: 500;
        }

        .badge span {
            font-weight: 700;
            color: #1e293b;
        }

        .btn-contact {
            background: #eef2f7;
            border: none;
            padding: 0.25rem 1.2rem;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #475569;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            font-family: inherit;
        }

        .btn-contact:hover {
            background: #667eea;
            color: #fff;
        }

        /* ===== 卡片列表（一行一个，紧凑） ===== */
        .grid {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-height: 200px;
        }

        .tool-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 0.7rem 1.2rem;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            border: 1px solid #edf2f7;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            user-select: none;
        }

        .tool-card:hover {
            background: #fafcff;
            border-color: #cbd5e1;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }

        .tool-card:active {
            transform: scale(0.99);
        }

        .tool-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }

        .tool-name {
            font-size: 1rem;
            font-weight: 600;
            color: #0b1a33;
            line-height: 1.3;
        }

        .tool-desc {
            font-size: 0.82rem;
            color: #8896ab;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-footer {
            flex-shrink: 0;
            font-size: 0.75rem;
            color: #b0bcca;
            font-weight: 500;
            transition: color 0.2s;
            margin-left: 0.5rem;
        }

        .tool-card:hover .card-footer {
            color: #667eea;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            background: transparent;
            border: none;
            min-height: 280px;
        }

        /* ===== 密码弹窗 ===== */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.50);
            backdrop-filter: blur(6px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .password-overlay.active {
            display: flex;
        }

        .password-modal {
            background: #ffffff;
            border-radius: 28px;
            padding: 40px 44px 36px;
            max-width: 400px;
            width: 92%;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.30);
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        .password-modal .lock-icon {
            font-size: 52px;
            display: block;
            margin-bottom: 6px;
        }

        .password-modal h2 {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .password-modal .sub {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 22px;
        }

        .password-input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .password-input-group input {
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            outline: none;
            text-align: center;
            letter-spacing: 6px;
            font-weight: 600;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .password-input-group input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.12);
        }

        .password-input-group .pwd-error {
            color: #ef4444;
            font-size: 13px;
            font-weight: 500;
            min-height: 22px;
        }

        .password-btn {
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.25);
        }

        .password-btn:hover {
            box-shadow: 0 6px 28px rgba(124, 58, 237, 0.35);
            transform: translateY(-1px);
        }

        .password-btn:active {
            transform: scale(0.96);
        }

        .password-cancel-btn {
            padding: 10px;
            background: none;
            color: #94a3b8;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .password-cancel-btn:hover {
            color: #64748b;
        }

        /* ===== 记事本弹窗（只读） ===== */
        .note-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.50);
            backdrop-filter: blur(6px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .note-overlay.active {
            display: flex;
        }

        .note-modal {
            background: #ffffff;
            border-radius: 28px;
            padding: 32px 36px 28px;
            max-width: 680px;
            width: 94%;
            max-height: 88vh;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.30);
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease;
            position: relative;
        }

        .note-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .note-modal-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .note-modal-header .badge {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            background: #f1f5f9;
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }

        .note-modal-close {
            background: none;
            border: none;
            font-size: 26px;
            color: #94a3b8;
            cursor: pointer;
            padding: 0 6px;
            transition: color 0.2s, transform 0.2s;
            line-height: 1;
        }

        .note-modal-close:hover {
            color: #ef4444;
            transform: rotate(90deg);
        }

        .note-display {
            width: 100%;
            min-height: 320px;
            max-height: 55vh;
            padding: 18px 22px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 15px;
            font-family: 'Segoe UI', 'PingFang SC', 'SF Mono', monospace;
            line-height: 1.9;
            color: #1e293b;
            background: #fafbfc;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            user-select: text;
            cursor: default;
        }

        .note-display::-webkit-scrollbar {
            width: 6px;
        }
        .note-display::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 8px;
        }
        .note-display::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }
        .note-display::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .note-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .note-btn-close {
            padding: 10px 32px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            background: #f1f3f5;
            color: #475569;
            transition: transform 0.12s, box-shadow 0.2s;
        }

        .note-btn-close:hover {
            background: #e9edf2;
        }

        .note-btn-close:active {
            transform: scale(0.96);
        }

        .note-footer-hint {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ===== 联系弹窗 ===== */
        .contact-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.50);
            backdrop-filter: blur(6px);
            z-index: 9998;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .contact-overlay.active {
            display: flex;
        }

        .contact-modal {
            background: #ffffff;
            border-radius: 28px;
            padding: 36px 44px 32px;
            max-width: 420px;
            width: 92%;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.30);
            animation: slideUp 0.3s ease;
        }

        .contact-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .contact-modal-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
        }

        .contact-modal-close {
            background: none;
            border: none;
            font-size: 28px;
            color: #94a3b8;
            cursor: pointer;
            padding: 0 4px;
            transition: color 0.2s, transform 0.2s;
            line-height: 1;
        }

        .contact-modal-close:hover {
            color: #ef4444;
            transform: rotate(90deg);
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: #f8fafc;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid #eef2f7;
        }

        .contact-item:last-child {
            margin-bottom: 0;
        }

        .contact-item .label {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            min-width: 44px;
        }

        .contact-item .value {
            font-size: 15px;
            font-weight: 500;
            color: #1e293b;
            font-family: 'SF Mono', 'Menlo', monospace;
            letter-spacing: 0.5px;
        }

        .contact-item .copy-btn {
            margin-left: auto;
            background: #eef2f7;
            border: none;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #475569;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            font-family: inherit;
            font-weight: 500;
        }

        .contact-item .copy-btn:hover {
            background: #667eea;
            color: #fff;
        }

        .contact-copy-hint {
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            margin-top: 16px;
        }

        /* ===== 右下角留言按钮 ===== */
        .btn-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(102, 126, 234, 0.40);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
            z-index: 9997;
            letter-spacing: 0.5px;
        }

        .btn-message:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 36px rgba(102, 126, 234, 0.50);
        }

        .btn-message:active {
            transform: scale(0.94);
        }

        /* ===== 动画 ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-10px);
            }
            40% {
                transform: translateX(10px);
            }
            60% {
                transform: translateX(-6px);
            }
            80% {
                transform: translateX(6px);
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            body {
                padding: 1.2rem 1rem 2rem;
            }
            .header-left h1 {
                font-size: 1.4rem;
            }
            .tool-card {
                padding: 0.6rem 1rem;
                border-radius: 10px;
            }
            .tool-name {
                font-size: 0.95rem;
            }
            .tool-desc {
                font-size: 0.78rem;
            }
            .contact-modal {
                padding: 28px 24px 24px;
            }
            .contact-item {
                flex-wrap: wrap;
                gap: 6px;
            }
            .contact-item .copy-btn {
                margin-left: 0;
                width: 100%;
                text-align: center;
                padding: 6px;
            }
            .btn-message {
                bottom: 20px;
                right: 20px;
                padding: 12px 20px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .header-left h1 {
                font-size: 1.2rem;
            }
            .badge {
                font-size: 0.75rem;
                padding: 0.2rem 0.8rem;
            }
            .btn-contact {
                font-size: 0.75rem;
                padding: 0.2rem 0.8rem;
            }
            .tool-card {
                padding: 0.5rem 0.8rem;
                gap: 0.5rem;
            }
            .tool-name {
                font-size: 0.9rem;
            }
            .tool-desc {
                font-size: 0.72rem;
                white-space: nowrap;
            }
            .card-footer {
                font-size: 0.7rem;
            }
            .btn-message {
                bottom: 16px;
                right: 16px;
                padding: 10px 16px;
                font-size: 13px;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f7;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #d0d9e8;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b0bcca;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- ===== 头部 ===== -->
        <header class="header">
            <div class="header-left" id="headerTrigger">
                <h1>工具箱</h1>
                <span class="badge">共 <span id="toolCount">0</span> 个工具</span>
            </div>
            <div class="header-right">
                <button class="btn-contact" id="contactBtn">联系</button>
            </div>
        </header>

        <!-- ===== 卡片网格 ===== -->
        <div class="grid" id="toolGrid">
            <!-- 由 JavaScript 动态渲染 -->
        </div>

    </div>

    <!-- ===== 右下角留言按钮 ===== -->
    <button class="btn-message" id="messageBtn">💬 留言</button>

    <!-- ============================================================
    你好
    ============================================================ -->
    <div id="noteSource" style="display:none;">
        
    </div>

    <!-- ============================================================
    🔒 密码弹窗
    ============================================================ -->
    <div class="password-overlay" id="passwordOverlay">
        <div class="password-modal">
            <span class="lock-icon">🔒</span>
            <h2>输入密码</h2>
            <p class="sub">请输入密码以查看隐藏记事本</p>
            <div class="password-input-group">
                <input type="password" id="passwordInput" placeholder="请输入密码" maxlength="20" autocomplete="off" />
                <div class="pwd-error" id="pwdError"></div>
                <button class="password-btn" id="pwdConfirmBtn">确认</button>
                <button class="password-cancel-btn" id="pwdCancelBtn">取消</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
    📖 记事本弹窗（只读展示）
    ============================================================ -->
    <div class="note-overlay" id="noteOverlay">
        <div class="note-modal">
            <div class="note-modal-header">
                <h2>
                    <span>📓</span> 我的笔记
                    <span class="badge">🔒 只读</span>
                </h2>
                <button class="note-modal-close" id="noteCloseBtn">&times;</button>
            </div>
            <div class="note-display" id="noteDisplay"></div>
            <div class="note-modal-footer">
                <span class="note-footer-hint">📌 内容只读 · 不可编辑</span>
                <button class="note-btn-close" id="noteCloseBtn2">✕ 关闭</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
    📞 联系弹窗
    ============================================================ -->
    <div class="contact-overlay" id="contactOverlay">
        <div class="contact-modal">
            <div class="contact-modal-header">
                <h2>📞 联系方式</h2>
                <button class="contact-modal-close" id="contactCloseBtn">&times;</button>
            </div>
            <div class="contact-item">
                <span class="label">微信</span>
                <span class="value">beron_yuyuyu</span>
                <button class="copy-btn" data-copy="beron_yuyuyu">复制</button>
            </div>
            <div class="contact-item">
                <span class="label">QQ</span>
                <span class="value">3586338672</span>
                <button class="copy-btn" data-copy="3586338672">复制</button>
            </div>
            <div class="contact-copy-hint">点击「复制」可复制到剪贴板</div>
        </div>
    </div>

    <script>
        // ============================================================
        //  1. 工具箱数据渲染
        // ============================================================
        const tools = [{
            name: '拼豆图纸像素化',
            description: '图片转像素图纸，支持坐标轴与颜色精度',
            icon: '',
            path: 'https://wafyuyuyuwaf.github.io/wafyuyuyuwaf/my_tools/tmtx.html'
        }, {
            name: '透明图像生成',
            description: '为图片添加圆角矩形阴影，输出透明PNG',
            icon: '',
            path: 'https://wafyuyuyuwaf.github.io/wafyuyuyuwaf/my_tools/scpdtz.html'
        }, {
            name: '多图层编辑器',
            description: '图层叠加、滤镜、裁剪、擦除、取色等高级编辑',
            icon: '',
            path: 'https://wafyuyuyuwaf.github.io/wafyuyuyuwaf/my_tools/ystq&gszh.html'
        }];

        const grid = document.getElementById('toolGrid');
        const countEl = document.getElementById('toolCount');

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function render() {
            countEl.textContent = tools.length;
            if (tools.length === 0) {
                grid.innerHTML = `<div class="empty-state">暂无工具</div>`;
                return;
            }
            let html = '';
            tools.forEach(t => {
                const desc = t.description || '点击打开';
                const safePath = t.path.replace(/"/g, '&quot;');
                html += `
                        <div class="tool-card" data-path="${safePath}" role="button" tabindex="0">
                            <div class="tool-info">
                                <div class="tool-name">${escapeHtml(t.name)}</div>
                                <div class="tool-desc">${escapeHtml(desc)}</div>
                            </div>
                            <div class="card-footer">打开 →</div>
                        </div>
                    `;
            });
            grid.innerHTML = html;
        }

        // 卡片点击打开新窗口
        grid.addEventListener('click', (e) => {
            const card = e.target.closest('.tool-card');
            if (!card) return;
            const path = card.getAttribute('data-path');
            if (path) window.open(path, '_blank');
        });

        render();

        // ============================================================
        //  2. 右下角留言按钮
        // ============================================================
        document.getElementById('messageBtn').addEventListener('click', function() {
            window.open('https://wafyuyuyuwaf.github.io/jishiben/index.html', '_blank');
        });

        // ============================================================
        //  3. 联系弹窗
        // ============================================================
        (function() {
            const contactBtn = document.getElementById('contactBtn');
            const contactOverlay = document.getElementById('contactOverlay');
            const contactCloseBtn = document.getElementById('contactCloseBtn');

            function openContact() {
                contactOverlay.classList.add('active');
            }

            function closeContact() {
                contactOverlay.classList.remove('active');
            }

            contactBtn.addEventListener('click', openContact);
            contactCloseBtn.addEventListener('click', closeContact);
            contactOverlay.addEventListener('click', function(e) {
                if (e.target === this) closeContact();
            });

            // ESC 关闭
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && contactOverlay.classList.contains('active')) {
                    closeContact();
                }
            });

            // 复制功能
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const text = this.getAttribute('data-copy');
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(text).then(() => {
                            const orig = this.textContent;
                            this.textContent = '✅ 已复制';
                            setTimeout(() => { this.textContent = orig; }, 1500);
                        }).catch(() => {
                            fallbackCopy(text, this);
                        });
                    } else {
                        fallbackCopy(text, this);
                    }
                });
            });

            function fallbackCopy(text, btn) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                textarea.style.left = '-9999px';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    const orig = btn.textContent;
                    btn.textContent = '✅ 已复制';
                    setTimeout(() => { btn.textContent = orig; }, 1500);
                } catch (_) {
                    alert('复制失败，请手动复制：' + text);
                }
                document.body.removeChild(textarea);
            }
        })();

        // ============================================================
        //  4. 隐藏记事本功能（点击标题5次触发密码）
        // ============================================================
        (function() {
            'use strict';

            const header = document.getElementById('headerTrigger');
            const passwordOverlay = document.getElementById('passwordOverlay');
            const noteOverlay = document.getElementById('noteOverlay');
            const passwordInput = document.getElementById('passwordInput');
            const pwdError = document.getElementById('pwdError');
            const pwdConfirmBtn = document.getElementById('pwdConfirmBtn');
            const pwdCancelBtn = document.getElementById('pwdCancelBtn');
            const noteDisplay = document.getElementById('noteDisplay');
            const noteCloseBtn = document.getElementById('noteCloseBtn');
            const noteCloseBtn2 = document.getElementById('noteCloseBtn2');

            const CORRECT_PASSWORD = '123';
            let clickCount = 0;
            let clickTimer = null;

            function getNoteContent() {
                const source = document.getElementById('noteSource');
                return source ? (source.textContent || source.innerText || '') :
                    '📝 暂无笔记内容，请在 HTML 中编辑 noteSource。';
            }

            function openPasswordDialog() {
                passwordOverlay.classList.add('active');
                passwordInput.value = '';
                pwdError.textContent = '';
                setTimeout(() => passwordInput.focus(), 100);
            }

            function closePasswordDialog() {
                passwordOverlay.classList.remove('active');
                passwordInput.value = '';
                pwdError.textContent = '';
            }

            function openNote() {
                noteDisplay.textContent = getNoteContent();
                noteOverlay.classList.add('active');
                noteDisplay.scrollTop = 0;
            }

            function closeNote() {
                noteOverlay.classList.remove('active');
            }

            function verifyPassword() {
                const input = passwordInput.value.trim();
                if (input === CORRECT_PASSWORD) {
                    closePasswordDialog();
                    openNote();
                } else {
                    pwdError.textContent = '❌ 密码错误，请重试';
                    passwordInput.value = '';
                    passwordInput.focus();
                    passwordInput.style.animation = 'none';
                    requestAnimationFrame(() => {
                        passwordInput.style.animation = 'shake 0.4s ease';
                    });
                }
            }

            header.addEventListener('click', function(e) {
                clickCount++;
                clearTimeout(clickTimer);
                clickTimer = setTimeout(() => {
                    clickCount = 0;
                }, 800);

                if (clickCount >= 5) {
                    clickCount = 0;
                    clearTimeout(clickTimer);
                    openPasswordDialog();
                }
            });

            pwdConfirmBtn.addEventListener('click', verifyPassword);
            passwordInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    verifyPassword();
                }
            });

            pwdCancelBtn.addEventListener('click', closePasswordDialog);
            passwordOverlay.addEventListener('click', function(e) {
                if (e.target === this) closePasswordDialog();
            });

            noteCloseBtn.addEventListener('click', closeNote);
            noteCloseBtn2.addEventListener('click', closeNote);
            noteOverlay.addEventListener('click', function(e) {
                if (e.target === this) closeNote();
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (noteOverlay.classList.contains('active')) {
                        closeNote();
                    } else if (passwordOverlay.classList.contains('active')) {
                        closePasswordDialog();
                    }
                }
            });
        })();
    </script>

</body>
</html>
